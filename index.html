<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SICT | Bienvenida</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- CONTENIDO -->
  <main class="welcome-container">
    <div class="card welcome-card">

        <!-- LOGO -->
    <img src="img/logo-sict.png" alt="Logo SICT" class="logo-sict">

      <h1>Bienvenido al Sistema Integral para Citas de Titulacion</h1>
      <p> Es hora de agendar tu cita de titulacion. </p>

      <hr>

      <h5>Selecciona el tipo de acceso</h5>

      <button class="btn btn-primary btn-lg w-100 mt-3" onclick="window.location.href='estudiantes-fecha.html'" >
        Acceso Estudiantes
      </button>

      <button class="btn btn-outline-secondary btn-lg w-100 mt-3" onclick="window.location.href='ingreso-admin.html'">
        Acceso Administrativo
      </button>
    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS -->
  <script>
    fetch('includes/header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header').innerHTML = data);

    fetch('includes/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer').innerHTML = data);
  </script>

</body>
</html>
