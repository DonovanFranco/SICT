<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SICT | Bienvenida</title>

  <link rel="icon" type="image/png" href="img/logo-sict.png">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap Icons (Necesario para los iconos de birrete e identificación) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- CONTENIDO -->
  <main class="welcome-container">
    <div class="card welcome-card shadow-sm p-4" style="max-width: 500px; margin: auto; margin-top: 50px; border-radius: 15px;">

      <!-- LOGO -->
      <div class="text-center">
        <img src="img/logo-sict.png" alt="Logo SICT" class="logo-sict mb-3" style="max-width: 150px;">
      </div>

      <h1 class="h3 text-center">Bienvenido al Sistema Integral para Citas de Titulación</h1>
      <p class="text-center text-muted">Es hora de agendar tu cita de titulación.</p>

      <hr>

      <h5 class="text-center mb-3">Selecciona el tipo de acceso</h5>

      <!-- CONTENEDOR DE BOTONES EN PARALELO -->
      <div class="d-flex gap-3 mt-4">
        
        <!-- BOTÓN EGRESADO -->
        <button class="btn btn-primary btn-lg w-100 d-flex flex-column align-items-center justify-content-center py-3" 
                onclick="window.location.href='estudiantes-fecha.html'">
          <i class="bi bi-mortarboard fs-4 mb-1"></i> <!-- Icono Birrete -->
          <span style="font-size: 0.85rem; font-weight: 500;">Egresado</span>
        </button>

        <!-- BOTÓN ADMINISTRATIVO -->
        <button class="btn btn-outline-secondary btn-lg w-100 d-flex flex-column align-items-center justify-content-center py-3" 
                onclick="window.location.href='ingreso-admin.html'">
          <i class="bi bi-person-badge fs-4 mb-1"></i> <!-- Icono Identificación -->
          <span style="font-size: 0.85rem; font-weight: 500;">Administrativo</span>
        </button>
        
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS -->
  <script>
    // Carga de Header y Footer
    fetch('includes/header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header').innerHTML = data);

    fetch('includes/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer').innerHTML = data);
  </script>

</body>
</html>
