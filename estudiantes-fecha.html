<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Elegir Fecha | SICT</title>

  <link rel="icon" type="image/png" href="img/logo-sict.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons (Agregado para el ícono de usuario) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<!-- HEADER -->
<div id="header"></div>

<!-- CONTENIDO -->
<main class="container mt-5">

  <h2 class="text-center mb-4">Elegir Fecha</h2>

  <div class="row">

    <!-- CALENDARIO -->
    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <!-- IMAGEN -->
        <center><img src="img/logo-fs.jpg" class="img-fluid mb-3" height="304" width="304" alt="Calendario"></center>
        <h5>Fechas disponibles</h5>

        <!-- INPUT FECHA (SOLO 2026) -->
        <input type="date"
       id="fecha"
       class="form-control mb-4">

        <!-- HIPERVÍNCULO AGREGADO -->
        <div class="text-center d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-person-circle fs-5 text-secondary"></i>
          <span>
            ¿Ya te has registrado? 
            <a href="ingreso-estudiante.html" class="text-decoration-none fw-semibold">Inicia sesión aquí</a>
          </span>
        </div>
      </div>
    </div>

    <!-- HORARIOS -->
    <div class="col-md-6">
      <div class="card p-3 shadow-sm">

        <h5>Horarios disponibles</h5>

        <!-- HORARIOS GENERADOS POR JS -->
        <div id="horarios" class="mb-3"></div>

        <!-- TEXTO FECHA + HORA -->
        <div id="seleccion"
             class="text-center fw-bold mb-3"
             style="font-size:18px; color:#0B2A4A;">
        </div>

        <!-- BOTÓN CONTINUAR -->
        <button id="btnContinuar"
                class="btn btn-success w-100"
                style="display:none;">
          Continuar
        </button>

      </div>
    </div>

  </div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- CARGAR HEADER/FOOTER -->
<script>
fetch('includes/header.html')
  .then(res => res.text())
  .then(data => document.getElementById('header').innerHTML = data);

fetch('includes/footer.html')
  .then(res => res.text())
  .then(data => document.getElementById('footer').innerHTML = data);
</script>

<!-- JS DEL SISTEMA -->
<script src="js/calendario.js"></script>

</body>
</html>
