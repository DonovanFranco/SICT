<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SICT | Ingreso Alumnos</title>

  <link rel="icon" type="image/png" href="img/logo-sict.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <!-- HEADER -->
  <div id="header"></div>

  <!-- CONTENIDO -->
  <main class="welcome-container">
    <div class="card welcome-card">

        <!-- LOGO -->
    <img src="img/logo-sict.png" alt="Logo SICT" class="logo-sict">

      <h1>Acceso Administrativo</h1>
      <p> Ingrese sus credenciales institucionales para continuar. </p>

      <hr>

      <h5> Uso exclusivo del personal autorizado. </h5>
      <p></p>
      
      <!-- NUM CONTROL -->
      <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input type="text" id="usuario" class="form-control" placeholder="Usuario administrativo" required>
      </div>

      <div class="mb-3">
      <label class="form-label">Contraseña</label>

  <div class="input-group">
  <input
    type="password"
    id="codigo"
    class="form-control"
    placeholder="Ingresa tu contraseña"
    required
  >
  <span class="input-group-text" id="togglePassword" style="cursor:pointer;">
    <!-- El icono inicial es el ojo tachado (oculto) -->
    <i id="toggleIcon" class="bi bi-eye-slash"></i>
  </span>
</div>
  <p></p>

      <button id="btnLoginAdmin" class="btn btn-primary btn-lg w-100 mt-3">
      Iniciar Sesion
      </button>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS -->
  <script>
    fetch('includes/header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header').innerHTML = data);

    fetch('includes/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer').innerHTML = data);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/login-admin.js"></script>

</body>
</html>
