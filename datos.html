<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Datos del Alumno | SICT</title>

<link rel="icon" type="image/png" href="img/logo-sict.png">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS GENERAL -->
<link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- CONTENIDO -->
<main class="container mt-5 mb-5">

<h2 class="text-center mb-4">Datos para la Cita de Titulación</h2>

<div class="row">

  <!-- TARJETA IZQUIERDA -->
  <div class="col-md-4 mb-4">
    <div class="card shadow-sm text-center p-3">

      <!-- IMAGEN -->
      <img src="img/logo-fa.jpeg" class="img-fluid mb-3" alt="Calendario">

      <!-- FECHA Y HORA -->
      <h5 class="text-primary">Tu cita</h5>
      <p id="infoCita" class="fw-bold"></p>

      <!-- BOTÓN CANCELAR -->
      <button id="btnCancelar" class="btn btn-outline-danger w-100" type="button">
        Cancelar
      </button>

      <div id="sessionTimerBox" style="position:fixed; top:80px; right:20px; z-index:9999;">
        <div id="sessionTimer" class="badge bg-primary fs-6 shadow">
          ⏳ Tiempo restante: 10:00
        </div>
      </div>

      <div id="confirmBox" class="container mt-3"></div>
    </div>
  </div>

  <!-- FORMULARIO -->
  <div class="col-md-8">
    <form id="formDatos" class="card p-4 shadow-sm">

      <!-- NUM CONTROL -->
      <div class="mb-3">
        <label class="form-label">Número de Control</label>
        <input type="text" id="control" class="form-control" placeholder="Numero de control a 8 digitos" required>
      </div>

      <!-- NOMBRE -->
      <div class="mb-3">
        <label class="form-label">Nombre Completo</label>
        <input type="text" id="nombre" class="form-control" placeholder="Nombre completo en mayusculas iniciando por nombre" required>
      </div>

      <!-- CURP-->
      <div class="mb-3">
        <label for="curp" class="form-label">CURP</label>
        <input 
          type="text" 
          class="form-control" 
          id="curp" 
          maxlength="18"
          placeholder="Ej. GOML900101HDFRRN09"
          style="text-transform:uppercase"
          required
        >
        <div class="invalid-feedback">
          CURP inválida.
        </div>
      </div>

      <!-- CARRERA -->
      <div class="mb-3">
        <label class="form-label">Carrera</label>
        <select id="carrera" class="form-select" required>
          <option value="">Seleccione...</option>
          <option>Licenciatura en Administración</option>
          <option>Arquitectura</option>
          <option>Ingeniería Civil</option>
          <option>Ingeniería en Diseño Industrial</option>
          <option>Ingeniería Eléctrica</option>
          <option>Ingeniería Ferroviaria</option>
          <option>Ingeniería en Gestión Empresarial</option>
          <option>Ingeniería Industrial</option>
          <option>Ingeniería Mecánica</option>
          <option>Ingeniería Química</option>
          <option>Ingeniería en Sistemas Computacionales</option>
          <option>Ingeniería en Tecnologías de la Información</option>
        </select>
      </div>

      <!-- CORREOS -->
      <div class="mb-3">
        <label class="form-label">Correo Electronico (Obligatorio)</label>
        <input type="email" id="correo" class="form-control" placeholder="Correo de Preferencia Personal o Institucional" required>
      </div>

      <!-- TELEFONO -->
      <div class="mb-3">
        <label class="form-label">Número Telefónico</label>
        <input type="tel" id="telefono" class="form-control" placeholder="Ingresa tu numero de telefono a 10 digitos" required>
      </div>

      <!-- CONTRASEÑA -->
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <input
            type="password"
            id="codigo"
            class="form-control"
            placeholder="Mínimo 8 caracteres"
            maxlength="30"
            required
          >
          <span class="input-group-text" id="togglePassword" style="cursor:pointer;">
            👁️
          </span>
        </div>
        <div id="errorCodigo" class="text-danger small mt-1" style="display:none;">
          Debe contener mínimo 8 caracteres, una mayúscula, una minúscula y un número.
        </div>
      </div>

      <!-- OPCION TITULACION -->
      <div class="mb-3">
        <label class="form-label">Opcion de Titulación</label>
        <select id="opcionTitulacion" class="form-select" required>
          <option value="">Seleccione...</option>
          <option>I Tesis</option>
          <option>II Libros de Texto o Prototipos Didacticos</option>
          <option>III Proyecto de Investigacion</option>
          <option>IV Diseño o Rediseño de Equipo, Aparato, Maquinaria</option>
          <option>V Curso Especial de Titulacion</option>
          <option>VI Examen Global por Areas de Conocimiento</option>
          <option>VII Memoria de Experiencia Profesional</option>
          <option>VIII Escolaridad Promedio</option>
          <option>IX Escolaridad por Estudios de Posgrado</option>
          <option>X Informe de Residencia Profesional</option>
          <option>X Memoria de Residencia Profesional</option>
          <option>Titulacion Integral</option>
          <option>Titulacion Integrada</option>
        </select>
      </div>

      <!-- TITULACION INTEGRAL OPCIONES -->
      <div id="integralOpciones" style="display:none;" class="mb-3">
        <!-- TIPO -->
        <label class="form-label">Tipo de Titulación Integral</label>
        <select id="tipoIntegral" class="form-select mb-3">
          <option value="">Seleccione...</option>
          <option>Residencia</option>
          <option>EGEL</option>
          <option>Proyecto de Investigacion</option>
          <option>Tesis</option>
          <option>Educacion Dual</option>
          <option>Otro</option>
        </select>

        <!-- NUM INTEGRANTES -->
        <label class="form-label">Número de Integrantes</label>
        <select id="numIntegrantes" class="form-select">
          <option value="">Seleccione...</option>
          <option value="1">1 integrante</option>
          <option value="2">2 integrantes</option>
          <option value="3">3 integrantes</option>
        </select>
      </div>

      <!-- NOTAS -->
      <div class="mb-3">
        <label class="form-label">Notas</label>
        <textarea id="notas" class="form-control"></textarea>
      </div>

      <div id="alertaBox" class="container mt-3"></div>

      <!-- Cambio: type="submit" sin propiedad onclick -->
      <button type="submit" class="btn btn-success">
        Confirmar cita
      </button>

    </form>
  </div>

</div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- CARGAR HEADER / FOOTER -->
<script>
fetch('includes/header.html')
  .then(res => res.text())
  .then(data => document.getElementById('header').innerHTML = data);

fetch('includes/footer.html')
  .then(res => res.text())
  .then(data => document.getElementById('footer').innerHTML = data);
</script>

<!-- JS -->
<script src="js/datos.js"></script>

<!-- MODAL CONFIRMACION -->
<div id="modalConfirm" class="modal-confirm">
  <div class="modal-box">
    <h3>Confirmar registro</h3>
    <p>¿Estás seguro de que los datos son correctos?</p>

    <div class="modal-actions">
      <button id="btnRevisar" class="btn-cancel">Revisar</button>
      <button id="btnConfirmar" class="btn-ok">Aceptar</button>
    </div>
  </div>
</div>

</body>
</html>
