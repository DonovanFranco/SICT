<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SICT | Ingreso Alumnos</title>

  <link rel="icon" type="image/png" href="img/logo-sict.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <!-- HEADER -->
  <div id="header"></div>

  <!-- CONTENIDO -->
  <main class="welcome-container">
    <div class="card welcome-card">

      <!-- LOGO -->
      <img src="img/logo-sict.png" alt="Logo SICT" class="logo-sict">

      <h1>Ingreso al SICT</h1>
      <p> Inicie sesión para administrar citas y procesos académicos. </p>

      <hr>

      <h5>Ingresa tus datos</h5>
      <p></p>
      
      <!-- NUM CONTROL -->
      <div class="mb-3">
        <label class="form-label">Número de Control</label>
        <input type="text" id="control" class="form-control" placeholder="Numero de control a 8 digitos" required>
      </div>

      <!-- CONTRASEÑA -->
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <input
            type="password"
            id="codigo"
            class="form-control"
            placeholder="Ingresa tu contraseña"
            required
          >
          <span class="input-group-text" id="togglePassword" style="cursor:pointer;">
            <i id="toggleIcon" class="bi bi-eye-slash"></i>
          </span>
        </div>
      </div>

      <!-- BOTÓN CONTINUAR -->
      <button id="btnLogin" class="btn btn-primary btn-lg w-100 mt-2">
        Iniciar Sesión
      </button>

      <!-- BLOQUE DE ENLACES DE AYUDA Y REGISTRO -->
      <div class="d-flex flex-column gap-3 pt-3 mt-4 border-top">
        
        <!-- Opción 1: Olvidé contraseña (Abre la Modal flotante) -->
        <div class="d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-key-fill fs-5 text-secondary"></i>
          <span>
            ¿Olvidaste tu contraseña? 
            <a href="#" class="text-decoration-none fw-semibold" data-bs-toggle="modal" data-bs-target="#modalRecuperar">Recupérala aquí</a>
          </span>
        </div>

        <!-- Opción 2: No registrado -->
        <div class="d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-calendar-event fs-5 text-secondary"></i>
          <span>
            ¿No te has registrado? 
            <a href="estudiantes-fecha.html" class="text-decoration-none fw-semibold">Regístrate aquí</a>
          </span>
        </div>

      </div>

    </div> 
  </main>

  <!-- MODAL FLOTANTE: RECUPERAR CONTRASEÑA -->
  <div class="modal fade" id="modalRecuperar" tabindex="-1" aria-labelledby="modalRecuperarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalRecuperarLabel">
            <i class="bi bi-key text-primary me-2"></i>Recuperar Contraseña
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted">Ingresa el correo electrónico que tienes registrado en el sistema para enviarte tus credenciales.</p>
          <div class="mb-3">
            <label for="correoRecuperar" class="form-label fw-semibold">Correo Electrónico</label>
            <input type="email" id="correoRecuperar" class="form-control" placeholder="ejemplo@correo.com" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btnEnviarCorreo" class="btn btn-primary">Continuar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS BOOTSTRAP (Es necesario para que abran las modales) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS INCLUDES -->
  <script>
    fetch('includes/header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header').innerHTML = data);

    fetch('includes/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer').innerHTML = data);
  </script>

  <!-- SWEETALERT 2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/login-e.js"></script>

</body>
</html>
