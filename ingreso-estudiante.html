<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SICT | Ingreso Alumnos</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <!-- HEADER -->
  <div id="header"></div>

  <!-- CONTENIDO -->
  <main class="welcome-container">
    <div class="card welcome-card">

        <!-- LOGO -->
    <img src="img/logo-sict.png" alt="Logo SICT" class="logo-sict">

      <h1>Ingreso al SICT</h1>
      <p> Inicie sesión para administrar citas y procesos académicos. </p>

      <hr>

      <h5>Ingresa tus datos</h5>
      <p></p>
      
      <!-- NUM CONTROL -->
      <div class="mb-3">
        <label class="form-label">Número de Control</label>
        <input type="text" id="control" class="form-control" placeholder="Numero de control a 8 digitos" required>
      </div>

      <div class="mb-3">
  <label class="form-label">Código de acceso</label>

  <div class="input-group">
    <input
      type="password"
      id="codigo"
      class="form-control"
      placeholder="Mínimo 8 caracteres"
      required
    >

    <span class="input-group-text" id="togglePassword" style="cursor:pointer;">
      👁️
    </span>
  </div>
  <p></p>

      <button class="btn btn-primary btn-lg w-100 mt-3" onclick="window.location.href='estudiantes-fecha.html'" >
        Iniciar Sesion
      </button>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS -->
  <script>
    fetch('includes/header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header').innerHTML = data);

    fetch('includes/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer').innerHTML = data);
  </script>

</body>
</html>
